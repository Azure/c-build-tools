;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;
;;  Visual Leak Detector - Default Configuration for test executables
;;
;;  This file is deployed alongside VLD-enabled test executables to suppress
;;  known false positives from Windows system DLL internal caching.
;;
;;  VLD v2.5.11+ initializes earlier via #pragma init_seg(lib), which causes
;;  it to catch one-time process-lifetime allocations by system DLLs that
;;  were previously invisible to VLD.
;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Any options left blank or not present will revert to their default values.
[Options]

VLD = on

AggregateDuplicates = no

ForceIncludeModules =

MaxDataDump =

MaxTraceFrames =

ReportEncoding = ascii

ReportFile =

ReportTo = debugger

SelfTest = off

StackWalkMethod = fast

StartDisabled = no

TraceInternalFrames = no

SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes

; Suppress false positives from Windows system DLL internal caching:
;   - CryptFindOIDInfo, I_CryptGetAsn1Decoder, I_CryptGetAsn1Encoder,
;     CryptEnumOIDFunction, CertOIDToAlgId, CryptMsgSignCTL,
;     CryptMsgOpenToDecode: CRYPT32.dll OID/ASN1 caches
;   - UuidFromStringA, UuidToStringA: RPCRT4.dll caches computer name via GetComputerNameExW
;   - SortGetHandle, InternalLcidToName, GetNamedLocaleHashNode: kernel locale caches
;   - CertStrToNameA: CRYPT32.dll certificate name string conversion cache
;
IgnoreFunctionsList = CryptFindOIDInfo,I_CryptGetAsn1Decoder,I_CryptGetAsn1Encoder,CryptEnumOIDFunction,CertOIDToAlgId,CryptMsgSignCTL,CryptMsgOpenToDecode,UuidFromStringA,UuidToStringA,SortGetHandle,InternalLcidToName,GetNamedLocaleHashNode,CertStrToNameA

;;                      dbghelp.dll
;;
;; dbghelp.dll is the Windows Debug Help Library used for symbol resolution
;; and stack walking (SymInitialize, StackWalk64, SymFromAddr, etc.).
;;
;; We ignore the entire module because dbghelp.dll allocates internal caches
;; on the process heap that are not fully freed even after calling SymCleanup.
;; These are not real leaks in our code - they are process-lifetime allocations
;; internal to dbghelp.dll.
;;
;; Why module-level exclusion instead of IgnoreFunctionsList:
;;
;;   The IgnoreFunctionsList approach (previously used here for StackWalk64
;;   and SymFromInlineContext) is fragile because:
;;
;;   1. Internal function names in dbghelp.dll change between Windows versions.
;;      A function suppressed on one build may be renamed or refactored in the
;;      next, causing false-positive leaks to reappear.
;;
;;   2. dbghelp.dll has MULTIPLE caching layers (FunctionEntryCache, symbol
;;      tables, line number caches, module lists) each with their own internal
;;      allocation functions. Enumerating every possible leaking function is
;;      impractical and must be maintained per Windows release.
;;
;;   3. There is a confirmed bug in dbghelp.dll where ClearFeCaches() (called
;;      by SymCleanup) only deletes 4 of 6 architecture-specific caches,
;;      missing Arm64FunctionEntries and CHPEFunctionEntries. This is filed as
;;      https://aka.ms/AA10dvw4 but until fixed, the leak is unavoidable.
;;
;; Additionally, there is a sequencing issue in our test runner:
;;
;;   main_ctest.c calls logger_init() (which calls get_thread_stack_init()
;;   -> SymInitialize) before RUN_TEST_SUITE, and logger_deinit() (which
;;   calls get_thread_stack_deinit() -> SymCleanup) after RUN_TEST_SUITE.
;;   VLD checks for leaks inside RUN_TEST_SUITE, so dbghelp's caches are
;;   still active at the time VLD inspects the heap. Even if SymCleanup
;;   were called before VLD checks, the bug above would still cause leaks.
;;
;; Alternative solutions considered:
;;
;;   a) Move logger_deinit() into TEST_SUITE_CLEANUP so it runs before VLD
;;      checks. This fixes the sequencing issue but not the dbghelp bug, and
;;      it forces every test suite to manage logger lifecycle.
;;
;;   b) Add a pre-VLD cleanup hook to the ctest/c-testrunnerswitcher
;;      framework (e.g., RUN_TEST_SUITE accepting a cleanup callback). This
;;      is the cleanest long-term solution but requires a framework change
;;      and does not address the dbghelp bug itself.
;;
;;   c) Ignore the entire dbghelp.dll module (this approach). Robust against
;;      Windows version changes, addresses both the sequencing issue and the
;;      dbghelp bug in one place, and requires no changes to test code or
;;      framework. The tradeoff is that genuine leaks in code paths that
;;      happen to include dbghelp frames could be masked - but such paths
;;      are limited to stack-walking and symbol resolution, which are
;;      diagnostic-only and do not allocate application memory.
;;
;; Source file: onecore\sdktools\debuggers\imagehlp\fecache.c
;; Affects:     ARM64 and CHPE targets using StackWalk64 + SymCleanup
;; Status:      Bug in dbghelp.dll; our cleanup code (get_thread_stack_deinit
;;              calling SymCleanup + CloseHandle) is correct and complete.
;; Bug filed:   https://aka.ms/AA10dvw4
;;
IgnoreModulesList = dbghelp.dll
