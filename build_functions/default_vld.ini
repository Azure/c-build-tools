;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;
;;  Visual Leak Detector - Default Configuration for test executables
;;
;;  This file is deployed alongside VLD-enabled test executables to suppress
;;  known false positives from Windows system DLL internal caching.
;;
;;  VLD v2.5.11+ initializes earlier via #pragma init_seg(lib), which causes
;;  it to catch one-time process-lifetime allocations by system DLLs that
;;  were previously invisible to VLD.
;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Any options left blank or not present will revert to their default values.
[Options]

VLD = on

AggregateDuplicates = no

ForceIncludeModules =

MaxDataDump =

MaxTraceFrames =

ReportEncoding = ascii

ReportFile =

ReportTo = debugger

SelfTest = off

StackWalkMethod = fast

StartDisabled = no

TraceInternalFrames = no

SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes

; Suppress false positives from Windows system DLL internal caching:
;   - CryptFindOIDInfo, I_CryptGetAsn1Decoder, I_CryptGetAsn1Encoder,
;     CryptEnumOIDFunction, CertOIDToAlgId, CryptMsgSignCTL,
;     CryptMsgOpenToDecode: CRYPT32.dll OID/ASN1 caches
;   - UuidFromStringA, UuidToStringA: RPCRT4.dll caches computer name via GetComputerNameExW
;   - SortGetHandle, InternalLcidToName, GetNamedLocaleHashNode: kernel locale caches
;   - CertStrToNameA: CRYPT32.dll certificate name string conversion cache
;; IgnoreFunctionsList = StackWalk64
;;
;; Suppresses a 112-byte leak reported by VLD originating from dbghelp.dll's
;; StackWalk64 -> SymFunctionTableAccess64AccessRoutines -> GetFeCache() path.
;;
;; Root cause (confirmed by stepping into dbghelp.dll source via SourceServer):
;;
;;   GetFeCache() in fecache.c creates per-architecture FunctionEntryCache
;;   objects using "new" and stores them in TLS:
;;
;;     - Amd64FunctionEntries  (line 1230)
;;     - Arm64FunctionEntries  (line 1241)  <-- leaked
;;     - CHPEFunctionEntries   (line 1250)  <-- leaked
;;     - ArmCeFunctionEntries  (line 1260)
;;     - ArmFunctionEntries    (line 1268)
;;     - PpcBeFunctionEntries  (line 1278)
;;
;;   ClearFeCaches() (line 1296), called by SymCleanup -> lSymCleanup,
;;   only deletes 4 of the 6 caches. It is missing:
;;
;;     - Arm64FunctionEntries   (sizeof(Arm64FunctionEntryCache) == 112 bytes)
;;     - CHPEFunctionEntries
;;
;;   The destructor (~FunctionEntryCache, line 35) properly frees the
;;   m_Entries array via MemFree, so the fix in dbghelp.dll would simply be
;;   adding the two missing "delete" calls to ClearFeCaches().
;;
;; Source file: onecore\sdktools\debuggers\imagehlp\fecache.c
;; Affects:     ARM64 and CHPE targets using StackWalk64 + SymCleanup
;; Status:      Bug in dbghelp.dll; our cleanup code (sym_cleanup_at_exit
;;              calling SymCleanup + CloseHandle) is correct and complete.
;; Bug filed: https://aka.ms/AA10dvw4
IgnoreFunctionsList = CryptFindOIDInfo,I_CryptGetAsn1Decoder,I_CryptGetAsn1Encoder,CryptEnumOIDFunction,CertOIDToAlgId,CryptMsgSignCTL,CryptMsgOpenToDecode,UuidFromStringA,UuidToStringA,SortGetHandle,InternalLcidToName,GetNamedLocaleHashNode,CertStrToNameA,StackWalk64
