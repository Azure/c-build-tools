name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: pool_name_windows_x64
    displayName: 'Windows x64 Pool'
    type: string
    default: 'Azure-MessagingStore-WinBuildPoolVS2022_0'
  - name: pool_name_windows_arm64
    displayName: 'Windows ARM64 Pool'
    type: string
    default: 'Azure-MessagingStore-WinBuildPoolARM'
  - name: pool_name_linux
    displayName: 'Linux Pool'
    type: string
    default: 'Azure-MsgStore-Linux2204BuildMachinePool'

resources:
- repo: self
  clean: true

jobs:
# Windows builds using build_all_flavors template
- template: /pipeline_templates/build_all_flavors.yml
  parameters:
    cmake_options: "-Drun_reals_check:bool=ON -Drun_unittests:bool=ON -Drun_int_tests:bool=ON -Drun_perf_tests:bool=ON -Duse_cppunittest:bool=ON -Drun_e2e_tests:BOOL=ON"
    repo_root_override: $(Build.SourcesDirectory)
    FSANITIZE_TYPE_VALUES: ["OFF"]
    # c-build-tools doesn't have VSTest-compatible tests, disable minimum test check
    failOnMinTestsNotRun: false
    pool_name_x64: ${{ parameters.pool_name_windows_x64 }}
    pool_name_arm64: ${{ parameters.pool_name_windows_arm64 }}

# srs_extension tests (run once, not per build configuration)
- job: srs_extension_tests
  displayName: 'srs_extension npm tests'
  pool:
    name: ${{ parameters.pool_name_windows_x64 }}
  steps:
  - task: Npm@1
    displayName: 'npm install for srs_extension'
    inputs:
      command: install
      workingDir: srs_extension

  - task: Npm@1
    displayName: 'npm run tests for srs_extension'
    inputs:
      command: custom
      customCommand: 'run test --verbose'
      workingDir: srs_extension

- template: /pipeline_templates/codeql3000_default.yml
  parameters:
    repo_root: $(Build.SourcesDirectory)
    pool_name: ${{ parameters.pool_name_windows_x64 }}

- template: /pipeline_templates/build_linux.yml
  parameters:
    cmake_options: '-Drun_valgrind:BOOL=ON -Drun_helgrind:BOOL=ON -Drun_drd:BOOL=ON -Drun_int_tests:bool=ON -Drun_perf_tests:bool=ON -Drun_e2e_tests:BOOL=ON'
    pool_name: ${{ parameters.pool_name_linux }}
