# Reusable resourceManagement.yml template for c-build-tools consuming repos
#
# This template provides the canonical GitHub resource management policy for repos
# that consume c-build-tools as a submodule. It includes:
# - Auto-approve rules for dependency updates (deps/) and c-build-tools ref file changes
# - Standard reviewer assignment for pull requests
#
# Usage:
#   Copy this file to your repo's .github/policies/resourceManagement.yml
#   Update the reviewer list as needed for your team
#
# Auto-approve pattern:
#   The pattern (^deps/|c_build_tools_ref\.yml$) auto-approves PRs where ALL changed
#   files are either under deps/ or the c_build_tools_ref.yml variable template file.
#   This ensures propagation PRs are auto-approved while manual code changes still
#   require human review.

id: 
name: GitOps.PullRequestIssueManagement
description: GitOps.PullRequestIssueManagement primitive
owner: 
resource: repository
disabled: false
where: 
configuration:
  resourceManagementConfiguration:
    scheduledSearches: []
    eventResponderTasks:
    - if:
      - payloadType: Pull_Request
      - filesMatchPattern:
          pattern: (^deps/|c_build_tools_ref\.yml$)
      - isOpen
      then:
      - approvePullRequest:
          comment: PR contains deps update, engage rubber stamping!
      description: 
    - if:
      - payloadType: Pull_Request
      - isOpen
      then:
      # Update reviewer list for your team
      - requestReview:
          reviewer: UPDATE_WITH_YOUR_REVIEWER
      description: 
onFailure: 
onSuccess: 
