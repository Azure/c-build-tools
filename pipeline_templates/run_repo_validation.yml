# This is the job template for running repo validation and traceability checks.
# These checks are architecture/configuration independent and only need to run once,
# rather than for every build flavor.
#
# It performs:
# - setup the machine
# - cmake generate with repo validation and traceability enabled
# - msbuild to execute the validation/traceability targets
# - cleanup

parameters:
  - name: cmake_options
    type: string
    default: "-Drun_traceability:BOOL=ON -Drun_repo_validation:BOOL=ON"

  - name: additional_cmake_options
    type: string
    default: ""

  - name: pool_name
    type: string
    default: "Azure-MessagingStore-WinBuildPoolVS2022_1"

  - name: setup_nuget
    type: boolean
    default: false

  # When set to a non-empty string, run a dedicated DotNetCoreCLI@2 restore
  # task using this nuget.config path before the msbuild build step (and run
  # msbuild with /t:build only). Default: empty -> combined /t:restore /t:build.
  # Set this when the consumer's internal-feed nuget.config cannot be found by
  # NuGet's walk-up search from the generated solution under ${CMAKE_BINARY_DIR}.
  - name: nuget_config_path
    type: string
    default: ''

jobs:
- job: run_repo_validation
  displayName: 'Run repo validation and traceability'

  pool:
    name: ${{ parameters.pool_name }}
    demands:
    - msbuild
    - visualstudio

  workspace:
    clean: all

  steps:
  - template: common_setup_steps.yml
    parameters:
      ARCH_TYPE: 'x64'
      setup_nuget: ${{ parameters.setup_nuget }}

  # CMake generate with repo validation and traceability enabled
  - template: tasks/cmake.yml
    parameters:
      architecture: 'x64'
      sourceDirectory: '$(Build.SourcesDirectory)'
      buildDirectory: '$(Build.BinariesDirectory)/c'
      cmakeArgs: '${{ parameters.cmake_options }} ${{ parameters.additional_cmake_options }} -DCMAKE_BUILD_TYPE=Debug'

  # Optional dedicated NuGet restore using an explicit nuget.config path. See
  # build_setup_steps.yml for rationale.
  - ${{ if ne(parameters.nuget_config_path, '') }}:
    - task: DotNetCoreCLI@2
      displayName: 'NuGet restore $(Build.BinariesDirectory)/c/*.sln*'
      inputs:
        command: 'restore'
        projects: '$(Build.BinariesDirectory)/c/*.sln*'
        feedsToUse: 'config'
        nugetConfigPath: '${{ parameters.nuget_config_path }}'
        noCache: true

  # Build the solution - repo validation and traceability targets are marked ALL
  # so they execute as part of the default ALL_BUILD target without needing
  # project-specific target names. When a dedicated restore ran above, build only;
  # otherwise combined restore+build.
  - template: tasks/msbuild.yml
    parameters:
      architecture: 'x64'
      solution: '$(Build.BinariesDirectory)/c/*.sln*'
      configuration: 'Debug'
      ${{ if ne(parameters.nuget_config_path, '') }}:
        msbuildArgs: '/t:build'
      ${{ else }}:
        msbuildArgs: '/t:restore /t:build'

  - template : clean_ado_folders.yml
