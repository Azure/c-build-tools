# This is the job template for running repo validation and traceability checks.
# These checks are architecture/configuration independent and only need to run once,
# rather than for every build flavor.
#
# It performs:
# - setup the machine
# - cmake generate with repo validation and traceability enabled
# - msbuild to execute the validation/traceability targets
# - cleanup

parameters:
  - name: cmake_options
    type: string
    default: "-Drun_traceability:BOOL=ON -Drun_repo_validation:BOOL=ON"

  - name: additional_cmake_options
    type: string
    default: ""

  - name: pool_name
    type: string
    default: "Azure-MessagingStore-WinBuildPoolVS2022_1"

  - name: setup_nuget
    type: boolean
    default: false

jobs:
- job: run_repo_validation
  displayName: 'Run repo validation and traceability'

  pool:
    name: ${{ parameters.pool_name }}
    demands:
    - msbuild
    - visualstudio

  workspace:
    clean: all

  steps:
  - template: get_machine_information.yml

  # Shallow clone - only need the code at this commit, not full history.
  # submodules: true is required for any consumer that has internal-ADO
  # submodules; the ADO Checkout task injects auth headers per-submodule-URL,
  # while the 'submodules: false + manual git submodule update script'
  # pattern only works for github.com (anonymous) submodules. github-only
  # consumers see no behavioral change.
  - checkout: self
    submodules: true
    clean: false
    fetchDepth: 1

  - template: discover_native_tools.yml
    parameters:
      architecture: 'x64'

  # Setup VS environment - use discovered vsPath for correct VS version
  - task: PowerShell@2
    displayName: 'Setup VS Vars'
    inputs:
      targetType: 'inline'
      script: |
        # Find VS using vswhere (works for any VS version)
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (Test-Path $vswhere) {
          $vsPath = & $vswhere -latest -products * -property installationPath
          if ($vsPath) {
            $vsDevCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
            if (Test-Path $vsDevCmd) {
              $archArgs = "-arch=amd64"
              Write-Host "Running VsDevCmd with x64 architecture: $vsDevCmd $archArgs"
              cmd /c "`"$vsDevCmd`" $archArgs && set" | ForEach-Object {
                if ($_ -match "^([^=]+)=(.*)$") {
                  [Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
                }
              }
            } else {
              Write-Host "##[warning]VsDevCmd.bat not found at $vsDevCmd"
            }
          }
        } else {
          Write-Host "##[warning]vswhere not found"
        }

  # Authenticate NuGet feeds so cmake configure can restore packages
  - ${{ if parameters.setup_nuget }}:
    - template: setup_nuget_tools.yml

  # Stage a repo-root nuget.config (if present) into the binaries dir so
  # msbuild's integrated /t:restore discovers it. See build_setup_steps.yml
  # for rationale. No-op if no repo-root nuget.config exists.
  - task: PowerShell@2
    displayName: 'Stage repo-root nuget.config for msbuild restore'
    inputs:
      targetType: inline
      script: |
        $sourcesDir = "$(Build.SourcesDirectory)"
        $binariesC = "$(Build.BinariesDirectory)/c"
        $candidate = Get-ChildItem -Path $sourcesDir -Filter 'nuget.config' -File -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $candidate) {
          Write-Host "No nuget.config at $sourcesDir; skipping."
          return
        }
        New-Item -ItemType Directory -Force -Path $binariesC | Out-Null
        $dst = Join-Path $binariesC $candidate.Name
        Copy-Item -LiteralPath $candidate.FullName -Destination $dst -Force
        Write-Host "Staged $($candidate.FullName) -> $dst"

  # CMake generate with repo validation and traceability enabled
  - template: tasks/cmake.yml
    parameters:
      architecture: 'x64'
      sourceDirectory: '$(Build.SourcesDirectory)'
      buildDirectory: '$(Build.BinariesDirectory)/c'
      cmakeArgs: '${{ parameters.cmake_options }} ${{ parameters.additional_cmake_options }} -DCMAKE_BUILD_TYPE=Debug'

  # Build the solution - repo validation and traceability targets are marked ALL
  # so they execute as part of the default ALL_BUILD target without needing
  # project-specific target names.
  - template: tasks/msbuild.yml
    parameters:
      architecture: 'x64'
      solution: '$(Build.BinariesDirectory)/c/*.sln*'
      configuration: 'Debug'
      msbuildArgs: '/t:restore /t:build'

  - template : clean_ado_folders.yml
