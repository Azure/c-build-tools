# Prints comprehensive machine information to the console including
# hardware, OS, drive mapping (with NVMe details), and software versions.
# Uses inline script so it works before checkout / submodule init.

steps:
  - task: PowerShell@2
    displayName: 'Machine Information'
    inputs:
      targetType: 'inline'
      errorActionPreference: 'SilentlyContinue'
      script: |
        $ErrorActionPreference = 'SilentlyContinue'

        Write-Host "=============================================="
        Write-Host "  Machine Information Diagnostic Report"
        Write-Host "=============================================="
        Write-Host ""

        # --- OS and System ---
        Write-Host "--- OS and System Information ---"
        try {
            $os = Get-CimInstance -ClassName Win32_OperatingSystem
            Write-Host "Computer Name   : $($os.CSName)"
            Write-Host "OS              : $($os.Caption) $($os.Version)"
            Write-Host "Build Number    : $($os.BuildNumber)"
            Write-Host "Architecture    : $($os.OSArchitecture)"
            Write-Host "Install Date    : $($os.InstallDate)"
            Write-Host "Last Boot       : $($os.LastBootUpTime)"
            $uptimeSpan = (Get-Date) - $os.LastBootUpTime
            Write-Host "Uptime          : $([int]$uptimeSpan.TotalDays)d $($uptimeSpan.Hours)h $($uptimeSpan.Minutes)m"
            Write-Host "Total Memory    : $([math]::Round($os.TotalVisibleMemorySize / 1MB, 2)) GB"
            Write-Host "Free Memory     : $([math]::Round($os.FreePhysicalMemory / 1MB, 2)) GB"
        } catch {
            Write-Host "Failed to get OS information: $_"
        }
        Write-Host ""

        # --- Processor ---
        Write-Host "--- Processor Information ---"
        try {
            Get-CimInstance -ClassName Win32_Processor | ForEach-Object {
                Write-Host "Name            : $($_.Name)"
                Write-Host "Cores           : $($_.NumberOfCores)"
                Write-Host "Logical CPUs    : $($_.NumberOfLogicalProcessors)"
                Write-Host "Max Clock       : $($_.MaxClockSpeed) MHz"
                Write-Host "Architecture    : $($_.Architecture)"
                Write-Host "L2 Cache        : $($_.L2CacheSize) KB"
                Write-Host "L3 Cache        : $($_.L3CacheSize) KB"
            }
        } catch {
            Write-Host "Failed to get processor information: $_"
        }
        Write-Host ""

        # --- Memory ---
        Write-Host "--- Physical Memory ---"
        try {
            Get-CimInstance -ClassName Win32_PhysicalMemory | ForEach-Object {
                $sizeGB = [math]::Round($_.Capacity / 1GB, 2)
                Write-Host "  Slot: $($_.DeviceLocator) | Size: ${sizeGB} GB | Speed: $($_.Speed) MHz | Type: $($_.MemoryType)"
            }
        } catch {
            Write-Host "Failed to get memory information: $_"
        }
        Write-Host ""

        # --- Drive Information with NVMe Mapping ---
        Write-Host "--- Physical Disks ---"
        try {
            $physicalDisks = Get-PhysicalDisk | Sort-Object DeviceId
            foreach ($disk in $physicalDisks) {
                $sizeGB = [math]::Round($disk.Size / 1GB, 2)
                Write-Host "  Disk $($disk.DeviceId): $($disk.FriendlyName)"
                Write-Host "    Media Type  : $($disk.MediaType)"
                Write-Host "    Bus Type    : $($disk.BusType)"
                Write-Host "    Size        : ${sizeGB} GB"
                Write-Host "    Health      : $($disk.HealthStatus)"
                Write-Host "    Op Status   : $($disk.OperationalStatus)"
                Write-Host "    Sector Size : $($disk.PhysicalSectorSize) bytes"

                if ($disk.BusType -eq 'NVMe') {
                    Write-Host "    [NVMe Drive Detected]"
                    try {
                        $storageAdapter = Get-CimInstance -Namespace root\Microsoft\Windows\Storage -ClassName MSFT_PhysicalDisk |
                            Where-Object { $_.DeviceId -eq $disk.DeviceId }
                        if ($storageAdapter.FirmwareVersion) {
                            Write-Host "    Firmware    : $($storageAdapter.FirmwareVersion)"
                        }
                    } catch {
                        # Silently continue if NVMe detail query fails
                    }
                }
            }
        } catch {
            Write-Host "Failed to get physical disk information: $_"
        }
        Write-Host ""

        # --- Disk to Volume Mapping ---
        Write-Host "--- Disk to Volume Mapping ---"
        try {
            $diskToPartition = Get-CimInstance -ClassName Win32_DiskDriveToDiskPartition
            $partitionToLogical = Get-CimInstance -ClassName Win32_LogicalDiskToPartition

            foreach ($d2p in $diskToPartition) {
                $diskIndex = if ($d2p.Antecedent.DeviceID -match 'PHYSICALDRIVE(\d+)') { $Matches[1] } else { '?' }
                $partId = $d2p.Dependent.DeviceID

                $volumes = $partitionToLogical | Where-Object { $_.Antecedent.DeviceID -eq $partId }
                foreach ($vol in $volumes) {
                    $driveLetter = $vol.Dependent.DeviceID
                    Write-Host "  PhysicalDrive${diskIndex} -> $partId -> $driveLetter"
                }
            }
        } catch {
            Write-Host "Failed to get disk-to-volume mapping: $_"
        }
        Write-Host ""

        # --- Logical Volumes ---
        Write-Host "--- Logical Volumes ---"
        try {
            Get-CimInstance -ClassName Win32_LogicalDisk | ForEach-Object {
                $driveTypes = @{ 0='Unknown'; 1='No Root'; 2='Removable'; 3='Local'; 4='Network'; 5='CD-ROM'; 6='RAM Disk' }
                $typeName = $driveTypes[[int]$_.DriveType]
                if ($_.Size -gt 0) {
                    $totalGB = [math]::Round($_.Size / 1GB, 2)
                    $freeGB = [math]::Round($_.FreeSpace / 1GB, 2)
                    $usedPct = [math]::Round((1 - $_.FreeSpace / $_.Size) * 100, 1)
                    Write-Host "  $($_.DeviceID) | Type: $typeName | Total: ${totalGB} GB | Free: ${freeGB} GB | Used: ${usedPct}%"
                } else {
                    Write-Host "  $($_.DeviceID) | Type: $typeName | Size: 0 (empty/no media)"
                }
            }
        } catch {
            Write-Host "Failed to get logical volume information: $_"
        }
        Write-Host ""

        # --- Key Software Versions ---
        Write-Host "--- Software Versions ---"

        try {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path $vswhere) {
                $vsInfo = & $vswhere -latest -products * -format json | ConvertFrom-Json
                if ($vsInfo) {
                    Write-Host "  Visual Studio : $($vsInfo[0].displayName) ($($vsInfo[0].installationVersion))"
                    Write-Host "    Path        : $($vsInfo[0].installationPath)"
                }
            } else {
                Write-Host "  Visual Studio : vswhere not found"
            }
        } catch {
            Write-Host "  Visual Studio : detection failed"
        }

        foreach ($t in @(
            @{ N = "CMake";  C = "cmake"; A = "--version" },
            @{ N = "Git";    C = "git";   A = "--version" },
            @{ N = "dotnet"; C = "dotnet"; A = "--version" }
        )) {
            try {
                $output = & $t.C $t.A 2>&1 | Select-Object -First 1
                Write-Host "  $($t.N.PadRight(14)) : $output"
            } catch {
                Write-Host "  $($t.N.PadRight(14)) : not found"
            }
        }

        Write-Host "  PowerShell    : $($PSVersionTable.PSVersion)"
        Write-Host ""

        # --- Environment Variables (build-relevant) ---
        Write-Host "--- Build Environment Variables ---"
        $buildVars = @(
            'BUILD_BINARIESDIRECTORY',
            'BUILD_SOURCESDIRECTORY',
            'AGENT_MACHINENAME',
            'AGENT_OS',
            'AGENT_OSARCHITECTURE',
            'VCPKG_ROOT',
            'VCPKG_DEFAULT_TRIPLET'
        )
        foreach ($var in $buildVars) {
            $val = [Environment]::GetEnvironmentVariable($var)
            if ($val) {
                Write-Host "  ${var} = ${val}"
            }
        }
        Write-Host ""

        # --- Agent Configuration ---
        Write-Host "--- Agent Configuration ---"
        # Known agent root directories. The .agent config file lives at
        # <root>/<version>/.agent (e.g. C:\vss-agent\4.269.0\.agent), so we
        # only need to search one level deep - NOT recurse into bin/, externals/
        # etc. which contain thousands of files and take minutes on ARM64.
        $agentPaths = @(
            "C:\a", "C:\Agent", "C:\vss-agent", "C:\azagent",
            "D:\a", "D:\Agent", "D:\vss-agent", "D:\azagent"
        )
        $found = $false
        foreach ($basePath in $agentPaths) {
            if (-not (Test-Path $basePath)) { continue }
            $agentFiles = Get-ChildItem -Path $basePath -Depth 1 -Filter ".agent" -ErrorAction SilentlyContinue
            foreach ($f in $agentFiles) {
                $found = $true
                Write-Host "  Found: $($f.FullName)"
                try {
                    $content = Get-Content $f.FullName -Raw
                    Write-Host $content
                } catch {
                    Write-Host "  (could not read)"
                }
            }
        }
        if (-not $found) {
            Write-Host "  No .agent config files found in known paths"
        }
        Write-Host ""

        # --- Azure VM Metadata (IMDS) ---
        # IMDS (169.254.169.254) is a local, unauthenticated endpoint that only
        # exists on Azure VMs. To guarantee this never hangs the pipeline on a
        # non-Azure or proxied agent, access is gated behind a fast TCP probe and
        # every HTTP call disables the proxy and uses a hard timeout. Any failure
        # is swallowed and simply skips the Azure sections.
        Write-Host "--- Azure VM Metadata (IMDS) ---"

        function Test-Imds {
            param([int]$TimeoutMs = 1500)
            try {
                $client = New-Object System.Net.Sockets.TcpClient
                $async = $client.BeginConnect('169.254.169.254', 80, $null, $null)
                $connected = $async.AsyncWaitHandle.WaitOne($TimeoutMs)
                $ok = $connected -and $client.Connected
                $client.Close()
                return $ok
            } catch {
                return $false
            }
        }

        function Get-ImdsJson {
            param([string]$Url, [int]$TimeoutMs = 5000)
            try {
                $req = [System.Net.HttpWebRequest]::Create($Url)
                $req.Method = 'GET'
                $req.Headers.Add('Metadata', 'true')
                $req.Proxy = $null
                $req.Timeout = $TimeoutMs
                $req.ReadWriteTimeout = $TimeoutMs
                $resp = $req.GetResponse()
                $reader = New-Object System.IO.StreamReader($resp.GetResponseStream())
                $body = $reader.ReadToEnd()
                $reader.Close()
                $resp.Close()
                return $body | ConvertFrom-Json
            } catch {
                return $null
            }
        }

        $instance = $null
        if (Test-Imds) {
            $instance = Get-ImdsJson 'http://169.254.169.254/metadata/instance?api-version=2023-07-01'
            if ($null -eq $instance) {
                $instance = Get-ImdsJson 'http://169.254.169.254/metadata/instance?api-version=2021-02-01'
            }
        }

        if ($null -eq $instance) {
            Write-Host "  IMDS not reachable - not an Azure VM, blocked, or timed out. Skipping Azure metadata."
        } else {
            try {
                $comp = $instance.compute
                $img = $comp.storageProfile.imageReference
                $imgVersion = $img.exactVersion
                if ([string]::IsNullOrWhiteSpace($imgVersion) -and $img.id) {
                    $imgVersion = ($img.id -split '/versions/')[-1]
                }
                $ephemeral = if ($comp.storageProfile.osDisk.diffDiskSettings.option) { 'Yes' } else { 'No' }
                Write-Host "  VM Name         : $($comp.name)"
                Write-Host "  Azure SKU       : $($comp.vmSize)"
                Write-Host "  Priority        : $($comp.priority)"
                Write-Host "  Location        : $($comp.location)"
                Write-Host "  Zone            : $($comp.zone)"
                Write-Host "  Fault Domain    : $($comp.platformFaultDomain)"
                Write-Host "  OS Type         : $($comp.osType)"
                Write-Host "  Image Version   : $imgVersion"
                Write-Host "  Image Id        : $($img.id)"
                Write-Host "  OS Disk (GB)    : $($comp.storageProfile.osDisk.diskSizeGB)"
                Write-Host "  Ephemeral OS    : $ephemeral"
                Write-Host "  VMSS Name       : $($comp.vmScaleSetName)"
                Write-Host "  VM Id           : $($comp.vmId)"
                Write-Host "  Resource Id     : $($comp.resourceId)"
            } catch {
                Write-Host "  Failed to parse IMDS compute metadata: $_"
            }
        }
        Write-Host ""

        # --- Azure Network (IMDS) ---
        Write-Host "--- Azure Network (IMDS) ---"
        if ($null -eq $instance) {
            Write-Host "  IMDS not reachable - skipping."
        } else {
            try {
                $nicIndex = 0
                foreach ($nic in @($instance.network.interface)) {
                    $privIps = ($nic.ipv4.ipAddress | ForEach-Object { $_.privateIpAddress } | Where-Object { $_ }) -join ', '
                    $pubIps  = ($nic.ipv4.ipAddress | ForEach-Object { $_.publicIpAddress } | Where-Object { $_ }) -join ', '
                    $subnets = ($nic.ipv4.subnet | ForEach-Object { "$($_.address)/$($_.prefix)" }) -join ', '
                    $v6Ips   = ($nic.ipv6.ipAddress | ForEach-Object { $_.privateIpAddress } | Where-Object { $_ }) -join ', '
                    Write-Host "  NIC ${nicIndex}:"
                    Write-Host "    MAC          : $($nic.macAddress)"
                    Write-Host "    Private IPv4 : $privIps"
                    if ($pubIps) { Write-Host "    Public IPv4  : $pubIps" }
                    Write-Host "    Subnet       : $subnets"
                    if ($v6Ips) { Write-Host "    IPv6         : $v6Ips" }
                    $nicIndex++
                }
            } catch {
                Write-Host "  Failed to parse IMDS network metadata: $_"
            }
        }
        Write-Host ""

        # --- Network Adapters (in-box) ---
        # Capabilities such as link speed and Accelerated Networking are not in
        # IMDS; they are read from the OS. Accelerated Networking surfaces as an
        # extra Mellanox / ConnectX virtual-function adapter next to the synthetic
        # Hyper-V NIC.
        Write-Host "--- Network Adapters ---"
        try {
            $adapters = Get-NetAdapter -ErrorAction SilentlyContinue | Sort-Object Name
            if ($adapters) {
                foreach ($a in $adapters) {
                    Write-Host "  $($a.Name) | $($a.InterfaceDescription)"
                    Write-Host "    Status: $($a.Status) | LinkSpeed: $($a.LinkSpeed) | MAC: $($a.MacAddress)"
                }
                $accel = $adapters | Where-Object { $_.InterfaceDescription -match 'Mellanox|ConnectX|Virtual Function' }
                if ($accel) {
                    Write-Host "  Accelerated Networking: Enabled (VF adapter present)"
                } else {
                    Write-Host "  Accelerated Networking: Not detected"
                }
            } else {
                Write-Host "  No network adapters reported (or Get-NetAdapter unavailable)"
            }
        } catch {
            Write-Host "  Failed to get network adapter information: $_"
        }
        Write-Host ""

        Write-Host "=============================================="
        Write-Host "  End of Machine Information Report"
        Write-Host "=============================================="

        exit 0
    continueOnError: true
    condition: always()
