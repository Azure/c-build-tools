# Prints comprehensive machine information to the console including
# hardware, OS, drive mapping (with NVMe details), and software versions.

parameters:
 - name: repo_root
   default: $(Build.SourcesDirectory)/deps/c-build-tools

steps:
  - task: PowerShell@2
    displayName: 'Machine Information'
    inputs:
      targetType: 'filePath'
      filePath: '${{ parameters.repo_root }}/pipeline_templates/scripts/get_machine_information.ps1'
    continueOnError: true
    condition: always()
