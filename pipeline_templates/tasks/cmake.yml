# Template: CMake Wrapper
# Uses native cmake.exe discovered by discover_native_tools.yml
#
# All architectures use the discovered $(cmakePath) directly via PowerShell,
# eliminating dependency on cmake being in the system PATH.
#
# Prerequisites:
#   - discover_native_tools.yml must be called first to set $(cmakePath), $(cmakeGenerator), $(cmakeArch)
#
# Usage:
#   - template: tasks/cmake.yml@c_build_tools
#     parameters:
#       architecture: 'ARM64'
#       sourceDirectory: '$(Build.SourcesDirectory)'
#       buildDirectory: '$(Build.BinariesDirectory)/build'
#       cmakeArgs: '-DCMAKE_BUILD_TYPE=Release -Drun_unittests=ON'

parameters:
  - name: architecture
    type: string
    default: 'x64'
    values:
      - 'x64'
      - 'x86'
      - 'ARM64'

  - name: sourceDirectory
    type: string
    default: '$(Build.SourcesDirectory)'

  - name: buildDirectory
    type: string
    default: '$(Build.BinariesDirectory)/build'

  - name: cmakeArgs
    type: string
    default: ''

  - name: displayName
    type: string
    default: ''

  - name: condition
    type: string
    default: 'succeeded()'

  - name: continueOnError
    type: boolean
    default: false

steps:
  # All architectures: Use native cmake.exe discovered by discover_native_tools.yml
  - task: PowerShell@2
    displayName: ${{ coalesce(parameters.displayName, format('CMake Generate ({0})', parameters.architecture)) }}
    condition: ${{ parameters.condition }}
    continueOnError: ${{ parameters.continueOnError }}
    inputs:
      targetType: 'inline'
      script: |
        $sourceDir = "${{ parameters.sourceDirectory }}"
        $buildDir = "${{ parameters.buildDirectory }}"
        $cmakeArgs = "${{ parameters.cmakeArgs }}"
        
        # Ensure build directory exists
        if (-not (Test-Path $buildDir)) {
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Write-Host "Created build directory: $buildDir"
        }
        
        Write-Host "============================================================"
        Write-Host "CMake Generate (${{ parameters.architecture }})"
        Write-Host "============================================================"
        Write-Host "CMake:      $(cmakePath)"
        Write-Host "Generator:  $(cmakeGenerator)"
        Write-Host "Arch:       $(cmakeArch)"
        Write-Host "Source:     $sourceDir"
        Write-Host "Build:      $buildDir"
        Write-Host "Args:       $cmakeArgs"
        Write-Host "============================================================"
        
        Push-Location $buildDir
        try {
          # -DCMAKE_SUPPRESS_REGENERATION=ON removes the ZERO_CHECK project from
          # generated Visual Studio solutions. ZERO_CHECK exists to detect changes
          # to CMakeLists.txt and re-run cmake, but every other project in the
          # solution depends on it. When MSBuild builds projects in parallel (/m),
          # multiple workers race to write ZERO_CHECK.tlog\unsuccessfulbuild and
          # fail with MSB3371 ("The process cannot access the file ... because it
          # is being used by another process"). The failure is timing-dependent
          # and is more likely under heavy I/O load (e.g. many parallel CI jobs
          # on a shared pool). In CI the build directory is always freshly
          # configured by this very step, so auto-regeneration on CMakeLists
          # change is never needed. Harmless no-op for non-Visual-Studio
          # generators (Ninja, Makefiles).
          $fullArgs = @($sourceDir) + ($cmakeArgs -split ' ') + @('-G', "$(cmakeGenerator)", '-A', "$(cmakeArch)", '-DCMAKE_SUPPRESS_REGENERATION=ON')
          # Filter out empty strings
          $fullArgs = $fullArgs | Where-Object { $_ -ne '' }
          
          Write-Host "Executing: `"$(cmakePath)`" $($fullArgs -join ' ')"
          & "$(cmakePath)" @fullArgs
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "CMake generation completed successfully"
        }
        finally {
          Pop-Location
        }
