# Template: MSBuild Wrapper
# Uses native MSBuild.exe discovered by discover_native_tools.yml
#
# All architectures use the discovered $(msbuildPath) directly via PowerShell,
# eliminating dependency on MSBuild being discoverable by the ADO task.
#
# Prerequisites:
#   - discover_native_tools.yml must be called first to set $(msbuildPath), $(targetPlatform)
#
# Usage:
#   - template: tasks/msbuild.yml@c_build_tools
#     parameters:
#       architecture: 'ARM64'
#       solution: '$(Build.BinariesDirectory)/build/*.sln'
#       configuration: 'Release'
#       msbuildArgs: '/t:restore /t:build'

parameters:
  - name: architecture
    type: string
    default: 'x64'
    values:
      - 'x64'
      - 'x86'
      - 'ARM64'

  - name: solution
    type: string

  - name: configuration
    type: string
    default: 'Debug'

  - name: msbuildArgs
    type: string
    default: ''

  - name: maximumCpuCount
    type: boolean
    default: true

  - name: restoreNuGetPackages
    type: boolean
    default: false

  - name: displayName
    type: string
    default: ''

  - name: condition
    type: string
    default: 'succeeded()'

  - name: continueOnError
    type: boolean
    default: false

steps:
  # All architectures: Use native MSBuild.exe discovered by discover_native_tools.yml
  - task: PowerShell@2
    displayName: ${{ coalesce(parameters.displayName, format('MSBuild ({0} {1})', parameters.architecture, parameters.configuration)) }}
    condition: ${{ parameters.condition }}
    continueOnError: ${{ parameters.continueOnError }}
    inputs:
      targetType: 'inline'
      script: |
        $solutionPattern = "${{ parameters.solution }}"
        $configuration = "${{ parameters.configuration }}"
        $msbuildArgs = "${{ parameters.msbuildArgs }}"
        $maxCpuCount = [bool]::Parse("${{ parameters.maximumCpuCount }}")
        $restoreNuget = [bool]::Parse("${{ parameters.restoreNuGetPackages }}")
        
        Write-Host "============================================================"
        Write-Host "MSBuild (${{ parameters.architecture }})"
        Write-Host "============================================================"
        Write-Host "MSBuild:       $(msbuildPath)"
        Write-Host "Platform:      $(targetPlatform)"
        Write-Host "Configuration: $configuration"
        Write-Host "Solution:      $solutionPattern"
        Write-Host "Args:          $msbuildArgs"
        Write-Host "============================================================"
        
        # Find solution file(s) - support both .sln and .slnx (VS 2026+)
        $solutions = @(Get-ChildItem -Path $solutionPattern -ErrorAction SilentlyContinue)
        # If pattern ends with *.sln, also search for *.slnx
        if ($solutionPattern -like '*.sln') {
          $solutions += @(Get-ChildItem -Path "${solutionPattern}x" -ErrorAction SilentlyContinue)
        }
        if ($null -eq $solutions -or $solutions.Count -eq 0) {
          # Try to resolve as a glob pattern
          $parentDir = Split-Path -Parent $solutionPattern
          $pattern = Split-Path -Leaf $solutionPattern
          if ($parentDir -and (Test-Path $parentDir)) {
            $solutions = @(Get-ChildItem -Path $parentDir -Filter $pattern -ErrorAction SilentlyContinue)
            if ($pattern -like '*.sln') {
              $solutions += @(Get-ChildItem -Path $parentDir -Filter "${pattern}x" -ErrorAction SilentlyContinue)
            }
          }
        }
        
        if ($null -eq $solutions -or $solutions.Count -eq 0) {
          Write-Error "No solution files found matching: $solutionPattern (also tried .slnx)"
          exit 1
        }
        
        foreach ($sln in $solutions) {
          Write-Host ""
          Write-Host "Building: $($sln.FullName)"
          
          $args = @($sln.FullName)
          $args += "/p:Configuration=$configuration"
          $args += "/p:Platform=$(targetPlatform)"
          
          if ($maxCpuCount) {
            $args += "/m"
          }
          
          if ($restoreNuget) {
            $args += "/restore"
          }
          
          if ($msbuildArgs) {
            $args += ($msbuildArgs -split ' ' | Where-Object { $_ -ne '' })
          }
          
          Write-Host "Executing: `"$(msbuildPath)`" $($args -join ' ')"
          & "$(msbuildPath)" @args
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSBuild failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
        }
        
        Write-Host ""
        Write-Host "MSBuild completed successfully"
