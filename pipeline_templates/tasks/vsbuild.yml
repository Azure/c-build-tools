# Template: VSBuild Wrapper
# Uses native MSBuild.exe discovered by discover_native_tools.yml
#
# All architectures use the discovered $(msbuildPath) directly via PowerShell,
# eliminating dependency on VSBuild/MSBuild being discoverable by the ADO task.
#
# Note: VSBuild is essentially MSBuild with VS-specific defaults.
#
# Prerequisites:
#   - discover_native_tools.yml must be called first to set $(msbuildPath), $(targetPlatform)
#
# Usage:
#   - template: tasks/vsbuild.yml@c_build_tools
#     parameters:
#       architecture: 'ARM64'
#       solution: '**/*.sln'
#       configuration: 'Release'
#       msbuildArgs: '/t:restore /t:build'

parameters:
  - name: architecture
    type: string
    default: 'x64'
    values:
      - 'x64'
      - 'x86'
      - 'ARM64'

  - name: solution
    type: string

  - name: configuration
    type: string
    default: 'Debug'

  - name: msbuildArgs
    type: string
    default: ''

  - name: maximumCpuCount
    type: boolean
    default: true

  - name: restoreNuGetPackages
    type: boolean
    default: false

  - name: clean
    type: boolean
    default: false

  - name: displayName
    type: string
    default: ''

  - name: condition
    type: string
    default: 'succeeded()'

  - name: continueOnError
    type: boolean
    default: false

steps:
  # All architectures: Use native MSBuild.exe discovered by discover_native_tools.yml
  - task: PowerShell@2
    displayName: ${{ coalesce(parameters.displayName, format('VSBuild ({0} {1})', parameters.architecture, parameters.configuration)) }}
    condition: ${{ parameters.condition }}
    continueOnError: ${{ parameters.continueOnError }}
    inputs:
      targetType: 'inline'
      script: |
        $solutionPattern = "${{ parameters.solution }}"
        $configuration = "${{ parameters.configuration }}"
        $msbuildArgs = "${{ parameters.msbuildArgs }}"
        $maxCpuCount = [bool]::Parse("${{ parameters.maximumCpuCount }}")
        $restoreNuget = [bool]::Parse("${{ parameters.restoreNuGetPackages }}")
        $clean = [bool]::Parse("${{ parameters.clean }}")
        
        Write-Host "============================================================"
        Write-Host "VSBuild (${{ parameters.architecture }} via MSBuild)"
        Write-Host "============================================================"
        Write-Host "MSBuild:       $(msbuildPath)"
        Write-Host "Platform:      $(targetPlatform)"
        Write-Host "Configuration: $configuration"
        Write-Host "Solution:      $solutionPattern"
        Write-Host "Args:          $msbuildArgs"
        Write-Host "============================================================"
        
        # Find solution file(s) - VSBuild supports wildcards, also check .slnx (VS 2026+)
        $solutions = @()
        if ($solutionPattern -match '\*') {
          # Glob pattern
          $solutions = @(Get-ChildItem -Path $solutionPattern -Recurse -ErrorAction SilentlyContinue)
          if ($solutionPattern -like '*.sln') {
            $solutions += @(Get-ChildItem -Path "${solutionPattern}x" -Recurse -ErrorAction SilentlyContinue)
          }
        } else {
          # Direct path
          if (Test-Path $solutionPattern) {
            $solutions = @(Get-Item $solutionPattern)
          }
        }
        
        if ($solutions.Count -eq 0) {
          Write-Error "No solution files found matching: $solutionPattern (also tried .slnx)"
          exit 1
        }
        
        foreach ($sln in $solutions) {
          Write-Host ""
          Write-Host "Building: $($sln.FullName)"
          
          $args = @($sln.FullName)
          $args += "/p:Configuration=$configuration"
          $args += "/p:Platform=$(targetPlatform)"
          
          if ($maxCpuCount) {
            $args += "/m"
          }
          
          if ($restoreNuget) {
            $args += "/restore"
          }
          
          if ($clean) {
            # Clean before build
            Write-Host "Cleaning..."
            $cleanArgs = @($sln.FullName, "/t:Clean", "/p:Configuration=$configuration", "/p:Platform=$(targetPlatform)")
            & "$(msbuildPath)" @cleanArgs
          }
          
          if ($msbuildArgs) {
            $args += ($msbuildArgs -split ' ' | Where-Object { $_ -ne '' })
          }
          
          Write-Host "Executing: `"$(msbuildPath)`" $($args -join ' ')"
          & "$(msbuildPath)" @args
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VSBuild (MSBuild) failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
        }
        
        Write-Host ""
        Write-Host "VSBuild completed successfully"
