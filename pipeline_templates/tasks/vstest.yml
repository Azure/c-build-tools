# Template: VSTest Wrapper
# Uses native vstest.console.exe discovered by discover_native_tools.yml
#
# All architectures use the discovered $(vstestPath) directly via PowerShell,
# eliminating dependency on the VSTest@2 ADO task which only supports
# VS versions [17.0, 18.0) and may not work with newer VS installations.
#
# Prerequisites:
#   - discover_native_tools.yml must be called first to set $(vsPath), $(vstestPath), $(targetPlatform)
#
# Usage:
#   - template: tasks/vstest.yml@c_build_tools
#     parameters:
#       architecture: 'ARM64'
#       testAssemblies: '$(Build.BinariesDirectory)/**/*_ut_*.dll'
#       configuration: 'Release'

parameters:
  - name: architecture
    type: string
    default: 'x64'
    values:
      - 'x64'
      - 'x86'
      - 'ARM64'

  - name: testAssemblies
    type: string

  - name: configuration
    type: string
    default: 'Debug'

  - name: runInParallel
    type: boolean
    default: true

  - name: runTestsInIsolation
    type: boolean
    default: true

  - name: codeCoverageEnabled
    type: boolean
    default: false

  - name: failOnMinTestsNotRun
    type: boolean
    default: true

  - name: diagnosticsEnabled
    type: boolean
    default: true

  - name: otherConsoleOptions
    type: string
    default: ''

  - name: runSettingsFile
    type: string
    default: ''

  - name: resultsFolder
    type: string
    default: ''

  - name: testRunTitle
    type: string
    default: ''

  - name: displayName
    type: string
    default: ''

  - name: condition
    type: string
    default: 'succeeded()'

  - name: continueOnError
    type: boolean
    default: false

steps:
  # All architectures: Use native vstest.console.exe discovered by discover_native_tools.yml
  - powershell: |
      $vstestPath = "$(vstestPath)"
      
      if (-not $vstestPath -or -not (Test-Path $vstestPath)) {
        Write-Error "VSTest runner not found at: $vstestPath"
        Write-Error "Ensure discover_native_tools.yml was called before this template"
        exit 1
      }
      Write-Host "Using vstest: $vstestPath"
      
      $testAssemblies = Get-ChildItem -Path "$(Build.BinariesDirectory)" -Recurse -Filter "*_ut_*.dll" | Where-Object { $_.FullName -notmatch '\\ref\\' }
      if ($testAssemblies.Count -eq 0) {
        Write-Error "No test assemblies found matching pattern"
        exit 1
      }
      
      $args = @()
      foreach ($dll in $testAssemblies) {
        $args += "`"$($dll.FullName)`""
      }
      
      $args += "/Platform:$(targetPlatform)"
      $args += "/Logger:trx"
      
      if ('${{ parameters.runTestsInIsolation }}' -eq 'true') {
        $args += "/InIsolation"
      }
      
      if ('${{ parameters.resultsFolder }}' -ne '') {
        $args += "/ResultsDirectory:`"${{ parameters.resultsFolder }}`""
      } else {
        $args += "/ResultsDirectory:`"$(Agent.TempDirectory)\TestResults`""
      }
      
      if ('${{ parameters.runSettingsFile }}' -ne '') {
        $args += "/Settings:`"${{ parameters.runSettingsFile }}`""
      }
      
      if ('${{ parameters.otherConsoleOptions }}' -ne '') {
        $args += '${{ parameters.otherConsoleOptions }}'
      }
      
      Write-Host "Running: $vstestPath $($args -join ' ')"
      & $vstestPath $args
      $exitCode = $LASTEXITCODE
      
      # Check for minimum tests run (equivalent to failOnMinTestsNotRun)
      if ('${{ parameters.failOnMinTestsNotRun }}' -eq 'true') {
        # Parse trx files to check if any tests ran
        $resultsDir = if ('${{ parameters.resultsFolder }}' -ne '') { '${{ parameters.resultsFolder }}' } else { "$(Agent.TempDirectory)\TestResults" }
        $trxFiles = Get-ChildItem -Path $resultsDir -Filter "*.trx" -ErrorAction SilentlyContinue
        if (-not $trxFiles -or $trxFiles.Count -eq 0) {
          Write-Error "failOnMinTestsNotRun: No test result files (.trx) were generated"
          exit 1
        }
        
        $totalTests = 0
        foreach ($trx in $trxFiles) {
          [xml]$trxContent = Get-Content $trx.FullName
          $counters = $trxContent.TestRun.ResultSummary.Counters
          if ($counters) {
            $totalTests += [int]$counters.total
          }
        }
        
        if ($totalTests -eq 0) {
          Write-Error "failOnMinTestsNotRun: No tests were executed (total=0)"
          exit 1
        }
        Write-Host "Total tests executed: $totalTests"
      }
      
      if ($exitCode -ne 0) {
        Write-Error "vstest.console.exe failed with exit code $exitCode"
        exit $exitCode
      }
    displayName: ${{ coalesce(parameters.displayName, format('VSTest ({0})', parameters.architecture)) }}
    condition: ${{ parameters.condition }}
    continueOnError: ${{ parameters.continueOnError }}
  
  # Publish test results
  - task: PublishTestResults@2
    displayName: 'Publish ${{ parameters.architecture }} Test Results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/*.trx'
      ${{ if ne(parameters.resultsFolder, '') }}:
        searchFolder: '${{ parameters.resultsFolder }}'
      ${{ else }}:
        searchFolder: '$(Agent.TempDirectory)/TestResults'
      ${{ if ne(parameters.testRunTitle, '') }}:
        testRunTitle: '${{ parameters.testRunTitle }}'
