# This is the job template for running CodeQL on a repository

parameters:
- name: sourceDirectory
  type: string
  default: '$(Build.SourcesDirectory)'
- name: cmakeArgs
  type: string
  default: ''
- name: 'configuration'
  type: string
  default: 'RelWithDebInfo'
- name: repo_root
  default: $(Build.SourcesDirectory)/deps/c-build-tools
- name: pool_name
  type: string
  default: 'Azure-MessagingStore-Win-x64-Dadsv5-v19'

jobs:
- job: codeql
  displayName: 'Run CodeQL on production code'
  pool:
    name: ${{ parameters.pool_name }}
    demands:
    - Cmd
    - visualstudio
    - build

  workspace:
    clean: all

  steps:
  - template: get_machine_information.yml

  - template: discover_native_tools.yml
    parameters:
      architecture: 'x64'

  - task: BatchScript@1
    displayName: 'Git submodule update'
    inputs:
      filename: 'C:\Program Files\Git\bin\git.exe'
      arguments: 'submodule update --init --force'

  - task: BatchScript@1
    displayName: 'Git submodule clean'
    inputs:
      filename: 'C:\Program Files\Git\bin\git.exe'
      arguments: 'submodule foreach --recursive "git clean -xdff"'

  - task: BatchScript@1
    displayName: 'Git clean'
    inputs:
      filename: 'C:\Program Files\Git\bin\git.exe'
      arguments: 'clean -xdff'

  - task: DeleteFiles@1
    displayName: 'Clean build binaries directory'
    inputs:
      sourceFolder: $(Build.BinariesDirectory)
      contents: \*

  - template: codeql3000_init.yml
    parameters:
      repo_root: ${{ parameters.repo_root }}

  - template: tasks/cmake.yml
    parameters:
      architecture: 'x64'
      sourceDirectory: ${{ parameters.sourceDirectory }}
      buildDirectory: 'build_x64'
      cmakeArgs: '-DCMAKE_BUILD_TYPE=${{ parameters.configuration }} ${{ parameters.cmakeArgs }}'

  - template: tasks/msbuild.yml
    parameters:
      architecture: 'x64'
      solution: 'build_x64/*.sln'
      configuration: ${{ parameters.configuration }}
      msbuildArgs: '/t:restore /t:build'

  - template: codeql3000_finalize.yml
    parameters:
      ignore_paths: 'deps/jemalloc;deps/mimalloc;deps/vcpkg;deps/libuv;build/vcpkg_installed'
      configuration: ${{parameters.configuration}}

  - template : clean_ado_folders.yml
