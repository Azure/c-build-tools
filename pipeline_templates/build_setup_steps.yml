# Reusable step template for build setup: checkout, toolchain discovery, cmake, and msbuild.
# Used by build_and_run_tests.yml for both the main test job and the AppVerifier job.

parameters:
  - name: ARCH_TYPE
    default: "x64"
  - name: repo_root_override
    default: $(Build.SourcesDirectory)/deps/c-build-tools
  - name: setup_nuget
    type: boolean
    default: false
  - name: cmake_options
    type: string
  - name: build_configuration
    default: "Debug"
  - name: GBALLOC_LL_TYPE
    type: string
  - name: use_vld_option
    type: string
  # nuget.config for an explicit DotNetCoreCLI restore before msbuild. Empty (default)
  # keeps combined /t:restore /t:build. Set when restore can't find the consumer's feed config.
  - name: nuget_config_path
    type: string
    default: ''

steps:
  - template: common_setup_steps.yml
    parameters:
      ARCH_TYPE: ${{ parameters.ARCH_TYPE }}
      setup_nuget: ${{ parameters.setup_nuget }}

  # Cleanup appverifier from any previous runs
  - template : disable_appverifier.yml
    parameters:
      ${{ if ne(parameters.repo_root_override, '') }}:
        repo_root: ${{ parameters.repo_root_override }}

  # Use wrapper template for CMake - handles ARM64 native tools transparently
  - template: tasks/cmake.yml
    parameters:
      architecture: ${{ parameters.ARCH_TYPE }}
      sourceDirectory: '$(Build.SourcesDirectory)'
      buildDirectory: '$(Build.BinariesDirectory)/c'
      cmakeArgs: '${{ parameters.cmake_options }} ${{ parameters.use_vld_option }} -DGBALLOC_LL_TYPE:string=${{ parameters.GBALLOC_LL_TYPE }} -DCMAKE_BUILD_TYPE=${{ parameters.build_configuration }}'

  # When nuget_config_path is set, run a dedicated restore here so the build step
  # below can run /t:build only (the source-tree config isn't on the sln's walk-up path).
  - ${{ if ne(parameters.nuget_config_path, '') }}:
    - task: DotNetCoreCLI@2
      displayName: 'NuGet restore $(Build.BinariesDirectory)/c/*.sln*'
      inputs:
        command: 'restore'
        projects: '$(Build.BinariesDirectory)/c/*.sln*'
        feedsToUse: 'config'
        nugetConfigPath: '${{ parameters.nuget_config_path }}'
        noCache: true

  # Use wrapper template for MSBuild - handles ARM64 native tools transparently.
  - template: tasks/msbuild.yml
    parameters:
      architecture: ${{ parameters.ARCH_TYPE }}
      solution: '$(Build.BinariesDirectory)/c/*.sln*'
      configuration: '${{ parameters.build_configuration }}'
      ${{ if ne(parameters.nuget_config_path, '') }}:
        msbuildArgs: '/t:build'
      ${{ else }}:
        msbuildArgs: '/t:restore /t:build'

  - template : start_logman.yml
    parameters:
      ${{ if ne(parameters.repo_root_override, '') }}:
        repo_root: ${{ parameters.repo_root_override }}
