# Reusable step template for build setup: checkout, toolchain discovery, cmake, and msbuild.
# Used by build_and_run_tests.yml for both the main test job and the AppVerifier job.

parameters:
  - name: ARCH_TYPE
    default: "x64"
  - name: repo_root_override
    default: $(Build.SourcesDirectory)/deps/c-build-tools
  - name: setup_nuget
    type: boolean
    default: false
  - name: cmake_options
    type: string
  - name: build_configuration
    default: "Debug"
  - name: GBALLOC_LL_TYPE
    type: string
  - name: use_vld_option
    type: string

steps:
  - template: get_machine_information.yml

  # Shallow clone - only need the code at this commit, not full history.
  # submodules: true (instead of false + a separate 'git submodule update'
  # script step) lets ADO's checkout task inject System.AccessToken-based
  # auth headers for every submodule URL, not just the outer repo URL.
  # This is required for any consumer that has internal-ADO submodules;
  # the previous 'manual submodule update script' pattern had no auth
  # headers at all and only worked for github.com submodules (anonymous
  # clone). Existing github.com submodules clone fine either way since
  # they're anonymous.
  - checkout: self
    submodules: true
    clean: false
    fetchDepth: 1

  # Authenticate NuGet feed so cmake configure can restore packages
  - ${{ if parameters.setup_nuget }}:
    - template: setup_nuget_tools.yml

  # Stage a repo-root nuget.config (if present) into the binaries dir so
  # msbuild's integrated /t:restore discovers it. msbuild's walk-up search
  # for nuget.config starts at the .csproj directory and walks upward;
  # the SOLUTION lives at $(Build.BinariesDirectory)/c, not under the
  # sources dir, so a nuget.config at the repo root is otherwise
  # invisible to restore. Copying it under the binaries dir puts it on
  # the walk-up path. No-op for consumers without a repo-root
  # nuget.config (the conditional copy just skips). Case-preserving
  # using Get-ChildItem -Filter so a config named NuGet.config or
  # nuget.config keeps its original case.
  - task: PowerShell@2
    displayName: 'Stage repo-root nuget.config for msbuild restore'
    inputs:
      targetType: inline
      script: |
        $sourcesDir = "$(Build.SourcesDirectory)"
        $binariesC = "$(Build.BinariesDirectory)/c"
        $candidate = Get-ChildItem -Path $sourcesDir -Filter 'nuget.config' -File -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $candidate) {
          Write-Host "No nuget.config at $sourcesDir; skipping."
          return
        }
        New-Item -ItemType Directory -Force -Path $binariesC | Out-Null
        $dst = Join-Path $binariesC $candidate.Name
        Copy-Item -LiteralPath $candidate.FullName -Destination $dst -Force
        Write-Host "Staged $($candidate.FullName) -> $dst"

  # ARM64: Verify agent architecture
  - ${{ if eq(parameters.ARCH_TYPE, 'ARM64') }}:
    - template: verify_agent_architecture.yml
      parameters:
        expected_architecture: 'ARM64'

  # Discover native tools
  - template: discover_native_tools.yml
    parameters:
      architecture: ${{ parameters.ARCH_TYPE }}

  # Setup VS environment - use discovered vsPath for correct VS version
  - task: PowerShell@2
    displayName: 'Setup VS Vars'
    inputs:
      targetType: 'inline'
      script: |
        # Find VS using vswhere (works for any VS version)
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (Test-Path $vswhere) {
          $vsPath = & $vswhere -latest -products * -property installationPath
          if ($vsPath) {
            $vsDevCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
            if (Test-Path $vsDevCmd) {
              # Set architecture parameters for VsDevCmd based on target architecture
              $arch = "${{ parameters.ARCH_TYPE }}"
              if ($arch -eq "ARM64") {
                $archArgs = "-arch=arm64 -host_arch=arm64"
                Write-Host "Running VsDevCmd with ARM64 architecture: $vsDevCmd $archArgs"
              } else {
                $archArgs = "-arch=amd64"
                Write-Host "Running VsDevCmd with x64 architecture: $vsDevCmd $archArgs"
              }
              cmd /c "`"$vsDevCmd`" $archArgs && set" | ForEach-Object {
                if ($_ -match "^([^=]+)=(.*)$") {
                  [Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
                }
              }
            } else {
              Write-Host "##[warning]VsDevCmd.bat not found at $vsDevCmd"
            }
          }
        } else {
          Write-Host "##[warning]vswhere not found"
        }

  # Cleanup appverifier from any previous runs
  - template : disable_appverifier.yml
    parameters:
      ${{ if ne(parameters.repo_root_override, '') }}:
        repo_root: ${{ parameters.repo_root_override }}

  # Use wrapper template for CMake - handles ARM64 native tools transparently
  - template: tasks/cmake.yml
    parameters:
      architecture: ${{ parameters.ARCH_TYPE }}
      sourceDirectory: '$(Build.SourcesDirectory)'
      buildDirectory: '$(Build.BinariesDirectory)/c'
      cmakeArgs: '${{ parameters.cmake_options }} ${{ parameters.use_vld_option }} -DGBALLOC_LL_TYPE:string=${{ parameters.GBALLOC_LL_TYPE }} -DCMAKE_BUILD_TYPE=${{ parameters.build_configuration }}'

  # Use wrapper template for MSBuild - handles ARM64 native tools transparently
  - template: tasks/msbuild.yml
    parameters:
      architecture: ${{ parameters.ARCH_TYPE }}
      solution: '$(Build.BinariesDirectory)/c/*.sln*'
      configuration: '${{ parameters.build_configuration }}'
      msbuildArgs: '/t:restore /t:build'

  - template : start_logman.yml
    parameters:
      ${{ if ne(parameters.repo_root_override, '') }}:
        repo_root: ${{ parameters.repo_root_override }}
