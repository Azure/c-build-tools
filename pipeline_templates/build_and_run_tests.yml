# This is the job template for building the binaries for one configuration. It does:
# - setup the machine
# - build binaries for desired configuration
# - run tests for the desired configuration
# - upload binaries artifacts for the desired configuration
# When APP_VERIFIER is ON, only AppVerifier CTest is run (VSTest and regular CTest are skipped).

parameters:
  - name: BUILD_SUFFIX
    type: string
  - name: GBALLOC_LL_TYPE
    type: string
  - name: FSANITIZE_TYPE
    type: string
  - name: build_configuration
    default: "Debug"
  - name: ARCH_TYPE
    default: "x64"
  - name: cmake_options
    type: string
    default: "-Drun_reals_check:bool=ON -Drun_unittests:bool=ON -Drun_int_tests:bool=ON -Duse_cppunittest:bool=ON -Drun_traceability:BOOL=OFF -Drun_repo_validation:BOOL=OFF"
  # If this parameter is specified the specified test suite will be run without invoking ctest
  - name: run_test_suite_without_ctest
    type: string
    default: ""
  # APP_VERIFIER: "ON" runs only AppVerifier CTest, "OFF" runs normal tests (VSTest, CTest)
  - name: APP_VERIFIER
    type: string
    default: "OFF"
  - name: repo_root_override
    default: $(Build.SourcesDirectory)/deps/c-build-tools
  - name: binary_name_suffix
    default: ".exe"
  - name: appverifier_skip_tests_list
    type: string
    default: ""
  - name: failOnMinTestsNotRun
    type: boolean
    default: true
  - name: pool_name
    type: string
    default: "Azure-MessagingStore-Win-x64-Dadsv5-v19"
  # MAX_STAGE is set per-architecture by build_all_flavors.yml (the only intended
  # caller). Policy:
  #   ARM64     -> arm64_max_stage (default UNIT_TESTS; caller-settable so repos
  #                                 migrate ARM64 test depth one at a time)
  #   x64 / x86 -> ALL         (run every CTest test that cmake_options registered)
  # Values:
  #   BUILD       - compile only. No test execution.
  #   UNIT_TESTS  - compile + run unit tests only (CTest excludes the _int / _perf
  #                 / _e2e categories; VSTest's *_ut_*.dll glob already restricts).
  #   INT_TESTS   - compile + run unit AND integration tests (CTest excludes only
  #                 the _perf / _e2e categories). Intermediate migration step
  #                 between UNIT_TESTS and ALL.
  #   ALL         - compile + run all registered CTest tests (no category filter).
  - name: MAX_STAGE
    type: string
    default: "ALL"
    values:
      - "BUILD"
      - "UNIT_TESTS"
      - "INT_TESTS"
      - "ALL"
  # When true, run NuGetAuthenticate and NuGetToolInstaller before cmake
  # so that execute_process(COMMAND nuget ...) can access private feeds.
  - name: setup_nuget
    type: boolean
    default: false
  # When true, publish $(Build.BinariesDirectory)/<build_configuration> on success
  # as artifact build_output_<BUILD_SUFFIX>. Separate from the failure-time publish
  # in build_teardown_steps.yml.
  - name: publish_artifacts_on_success
    type: boolean
    default: false
  # Hang watchdog: wraps CTest execution with a background process that captures
  # full-memory dumps of test exes approaching their per-test timeout.
  - name: enable_hang_watchdog
    type: boolean
    default: true
  - name: hang_watchdog_name_pattern
    type: string
    default: '_exe_'
  - name: hang_dump_threshold_sec
    type: number
    default: 1200

jobs:
- job: build_and_run_tests_${{ parameters.BUILD_SUFFIX }}
  displayName: 'Build and run tests, build_configuration: ${{ parameters.build_configuration }}, ${{ parameters.GBALLOC_LL_TYPE}}, ARCH_TYPE=${{ parameters.ARCH_TYPE }}, FSANITIZE_TYPE: ${{ parameters.FSANITIZE_TYPE}}, APP_VERIFIER=${{ parameters.APP_VERIFIER }}, MAX_STAGE=${{ parameters.MAX_STAGE }}'

  variables:
    ${{ if eq(parameters.FSANITIZE_TYPE, 'ON') }}:
      use_vld_option: '-Duse_vld:bool=OFF'
    ${{ if eq(parameters.FSANITIZE_TYPE, 'OFF') }}:
      use_vld_option: '-Duse_vld:bool=ON'

  pool:
    name: ${{ parameters.pool_name }}
    demands:
    - msbuild
    - visualstudio

  workspace:
    clean: all

  steps:
  - template: build_setup_steps.yml
    parameters:
      ARCH_TYPE: ${{ parameters.ARCH_TYPE }}
      repo_root_override: ${{ parameters.repo_root_override }}
      setup_nuget: ${{ parameters.setup_nuget }}
      cmake_options: ${{ parameters.cmake_options }}
      build_configuration: ${{ parameters.build_configuration }}
      GBALLOC_LL_TYPE: ${{ parameters.GBALLOC_LL_TYPE }}
      use_vld_option: ${{ variables.use_vld_option }}

  # Run tests only when MAX_STAGE runs tests. BUILD mode compiles only.
  - ${{ if or(eq(parameters.MAX_STAGE, 'UNIT_TESTS'), eq(parameters.MAX_STAGE, 'INT_TESTS'), eq(parameters.MAX_STAGE, 'ALL')) }}:

    # When APP_VERIFIER is OFF, run normal tests (VSTest, CTest)
    - ${{ if eq(parameters.APP_VERIFIER, 'OFF') }}:
      # in the gate address sanitizer has problems running which are not reproducible locally, so skipping Address Sanitizer for vstest (note: ctest is perfectly fine with Address Sanitizer)
      # here's example:
      #   vstest.console will output
      # Starting test execution, please wait...
      #A total of 257 test files matched the specified pattern.
      ##[error]The active test run was aborted. Reason: Test host process crashed : AddressSanitizer: CHECK failed: asan_thread.cpp:273 "((tid())) == ((0))" (0x1, 0x0) (tid=11016)
      # [continues, with none of our code on any stack]

      # Use wrapper template for VSTest - handles ARM64 (VSTest@3) vs x64 (VSTest@2) transparently
      - ${{ if and(eq(parameters.FSANITIZE_TYPE, 'OFF'), eq(parameters.run_test_suite_without_ctest, '')) }}:
        - template: tasks/vstest.yml
          parameters:
            architecture: ${{ parameters.ARCH_TYPE }}
            testAssemblies: |
              $(Build.BinariesDirectory)\c\${{ parameters.build_configuration }}\**\*_ut_*.dll
              $(Build.BinariesDirectory)\${{ parameters.build_configuration }}\**\*_ut_*.dll
            configuration: '${{ parameters.build_configuration }}'
            failOnMinTestsNotRun: ${{ parameters.failOnMinTestsNotRun }}
            codeCoverageEnabled: ${{ ne(parameters.ARCH_TYPE, 'ARM64') }}
            # Code Coverage collector is not validated on ARM64 build pools, so only
            # request it on x64. Mirrors codeCoverageEnabled above; passed via
            # otherConsoleOptions because tasks/vstest.yml currently appends
            # otherConsoleOptions verbatim and does not honor codeCoverageEnabled itself.
            ${{ if ne(parameters.ARCH_TYPE, 'ARM64') }}:
              otherConsoleOptions: '/collect:"Code Coverage;Format=Xml"'
            runSettingsFile: '${{ parameters.repo_root_override }}/pipeline_templates/scripts/tests_native.runsettings'
            resultsFolder: '$(build.ArtifactStagingDirectory)/Test/VsTest/Results/${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}'
            testRunTitle: 'VsTest Native ${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}'

        # Publish code coverage results from vstest (x64 only - ARM64 does not collect coverage)
        - ${{ if ne(parameters.ARCH_TYPE, 'ARM64') }}:
          - task: PublishCodeCoverageResults@2
            displayName: '📰 Publish Code Coverage'
            inputs:
              summaryFileLocation: '$(build.ArtifactStagingDirectory)/Test/VsTest/Results/${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}/*/*.xml'
              pathToSources: '$(Build.SourcesDirectory)'

      # CTest execution — when hang watchdog is enabled, wrap with watchdog for dump capture.
      # When disabled, use the original tasks/ctest.yml template.
      - ${{ if eq(parameters.run_test_suite_without_ctest, '') }}:
        - ${{ if parameters.enable_hang_watchdog }}:
          # Watchdog-wrapped CTest: builds ctest arguments per MAX_STAGE filter
          - ${{ if eq(parameters.MAX_STAGE, 'UNIT_TESTS') }}:
            - template: run_with_hang_watchdog.yml
              parameters:
                repo_root: ${{ parameters.repo_root_override }}
                display_name: 'CTest (${{ parameters.ARCH_TYPE }}) [watchdog]'
                executable: '$(ctestPath)'
                working_directory: '$(Build.BinariesDirectory)/c'
                name_pattern: '${{ parameters.hang_watchdog_name_pattern }}'
                dump_threshold_sec: ${{ parameters.hang_dump_threshold_sec }}
                arguments: '-C ${{ parameters.build_configuration }} --output-on-failure --interactive-debug-mode 1 --output-junit ctest_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml -E "_int($|_)|_perf($|_)|_e2e($|_)"'
          - ${{ if eq(parameters.MAX_STAGE, 'INT_TESTS') }}:
            - template: run_with_hang_watchdog.yml
              parameters:
                repo_root: ${{ parameters.repo_root_override }}
                display_name: 'CTest (${{ parameters.ARCH_TYPE }}) [watchdog]'
                executable: '$(ctestPath)'
                working_directory: '$(Build.BinariesDirectory)/c'
                name_pattern: '${{ parameters.hang_watchdog_name_pattern }}'
                dump_threshold_sec: ${{ parameters.hang_dump_threshold_sec }}
                arguments: '-C ${{ parameters.build_configuration }} --output-on-failure --interactive-debug-mode 1 --output-junit ctest_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml -E "_perf($|_)|_e2e($|_)"'
          - ${{ if eq(parameters.MAX_STAGE, 'ALL') }}:
            - template: run_with_hang_watchdog.yml
              parameters:
                repo_root: ${{ parameters.repo_root_override }}
                display_name: 'CTest (${{ parameters.ARCH_TYPE }}) [watchdog]'
                executable: '$(ctestPath)'
                working_directory: '$(Build.BinariesDirectory)/c'
                name_pattern: '${{ parameters.hang_watchdog_name_pattern }}'
                dump_threshold_sec: ${{ parameters.hang_dump_threshold_sec }}
                arguments: '-C ${{ parameters.build_configuration }} --output-on-failure --interactive-debug-mode 1 --no-tests=error --output-junit ctest_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml'

        - ${{ if not(parameters.enable_hang_watchdog) }}:
          - template: tasks/ctest.yml
            parameters:
              architecture: ${{ parameters.ARCH_TYPE }}
              workingDirectory: '$(Build.BinariesDirectory)/c'
              configuration: '${{ parameters.build_configuration }}'
              outputJunit: 'ctest_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml'
              ${{ if eq(parameters.MAX_STAGE, 'UNIT_TESTS') }}:
                excludeTests: '_int($|_)|_perf($|_)|_e2e($|_)'
                noTestsError: false
              ${{ if eq(parameters.MAX_STAGE, 'INT_TESTS') }}:
                excludeTests: '_perf($|_)|_e2e($|_)'
                noTestsError: false

      - ${{ if eq(parameters.run_test_suite_without_ctest, '') }}:
        - task: PublishTestResults@2
          displayName: '📊 Publish ctest results'
          inputs:
            testResultsFormat: 'JUnit'
            searchFolder: $(Build.BinariesDirectory)\c
            testResultsFiles: 'ctest_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml'
            testRunTitle: 'ctest${{ parameters.BUILD_SUFFIX }}'
            buildConfiguration: ${{ parameters.build_configuration }}
            failTaskOnMissingResultsFile: true
          condition: always()

      - ${{ if not(eq(parameters.run_test_suite_without_ctest, '')) }}:
        - task: CmdLine@2
          displayName: '🧪 Run ${{ parameters.run_test_suite_without_ctest }}'
          inputs:
            script: '$(Build.BinariesDirectory)\${{ parameters.build_configuration }}\${{ parameters.run_test_suite_without_ctest }}\${{ parameters.run_test_suite_without_ctest }}.exe'
            workingDirectory: '$(Build.BinariesDirectory)\${{ parameters.build_configuration }}\${{ parameters.run_test_suite_without_ctest }}'

    # When APP_VERIFIER is ON, run only AppVerifier CTest
    - ${{ if eq(parameters.APP_VERIFIER, 'ON') }}:
      - template : run_ctests_with_appverifier.yml
        parameters:
          ${{ if ne(parameters.repo_root_override, '') }}:
            repo_root: ${{ parameters.repo_root_override }}
          binary_name_suffix: ${{ parameters.binary_name_suffix }}
          ctest_tests_bin_directory: $(Build.BinariesDirectory)\c
          ${{ if ne(parameters.appverifier_skip_tests_list, '') }}:
            ctest_additional_args: "-E ${{ parameters.appverifier_skip_tests_list }}"
          test_steps:
          - template: tasks/ctest.yml
            parameters:
              architecture: ${{ parameters.ARCH_TYPE }}
              workingDirectory: '$(Build.BinariesDirectory)/c'
              configuration: '${{ parameters.build_configuration }}'
              outputJunit: 'ctest_appverifier_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml'
              # noTestsError is true only when no exclude reason is in play. Either
              # an appverifier_skip_tests_list or a MAX_STAGE category filter
              # (UNIT_TESTS or INT_TESTS) constitutes a deliberate exclude, so
              # matching zero tests is legitimate (e.g. macro-utils-c only has _int
              # tests). Only ALL with no skip list expects every listed test to run.
              noTestsError: ${{ and(eq(parameters.appverifier_skip_tests_list, ''), eq(parameters.MAX_STAGE, 'ALL')) }}
              # See the comment on the regular ctest invocation above for why
              # UNIT_TESTS skips _int/_perf/_e2e and INT_TESTS skips only
              # _perf/_e2e. AppVerifier helper itself configures appverif for
              # whatever ctest -N returns; that config is harmless for tests that
              # won't actually run.
              # The exclude regex is composed from up to two sources:
              #   1. The caller-provided appverifier_skip_tests_list (tests known
              #      to misbehave under AppVerifier).
              #   2. The MAX_STAGE test-category filter (UNIT_TESTS: _int|_perf|_e2e;
              #      INT_TESTS: _perf|_e2e), each token suffixed with ($|_) so it
              #      matches both trailing and middle uses.
              # The mutually-exclusive cases are spelled out here because the parts
              # have to be combined with a regex '|' separator.
              ${{ if and(eq(parameters.MAX_STAGE, 'UNIT_TESTS'), ne(parameters.appverifier_skip_tests_list, '')) }}:
                excludeTests: '${{ parameters.appverifier_skip_tests_list }}|_int($|_)|_perf($|_)|_e2e($|_)'
              ${{ if and(eq(parameters.MAX_STAGE, 'UNIT_TESTS'), eq(parameters.appverifier_skip_tests_list, '')) }}:
                excludeTests: '_int($|_)|_perf($|_)|_e2e($|_)'
              ${{ if and(eq(parameters.MAX_STAGE, 'INT_TESTS'), ne(parameters.appverifier_skip_tests_list, '')) }}:
                excludeTests: '${{ parameters.appverifier_skip_tests_list }}|_perf($|_)|_e2e($|_)'
              ${{ if and(eq(parameters.MAX_STAGE, 'INT_TESTS'), eq(parameters.appverifier_skip_tests_list, '')) }}:
                excludeTests: '_perf($|_)|_e2e($|_)'
              ${{ if eq(parameters.MAX_STAGE, 'ALL') }}:
                excludeTests: '${{ parameters.appverifier_skip_tests_list }}'

      - task: PublishTestResults@2
        displayName: '📊 Publish ctest results'
        inputs:
          testResultsFormat: 'JUnit'
          searchFolder: $(Build.BinariesDirectory)\c
          testResultsFiles: 'ctest_appverifier_results_${{ parameters.build_configuration }}${{ parameters.BUILD_SUFFIX }}.xml'
          testRunTitle: 'CTest${{ parameters.BUILD_SUFFIX }} App Verifier'
          buildConfiguration: ${{ parameters.build_configuration }}
          failTaskOnMissingResultsFile: true
        condition: always()

  # Publish the configuration's build output on success, for downstream jobs in
  # the same pipeline to consume via DownloadPipelineArtifact. The artifact
  # Publish the build output on success as artifact build_output_<BUILD_SUFFIX>.
  # Separate from the failure-time publish in build_teardown_steps.yml.
  - ${{ if parameters.publish_artifacts_on_success }}:
    - task: PublishPipelineArtifact@1
      displayName: 'Publish ${{ parameters.build_configuration }} build output'
      inputs:
        targetPath: '$(Build.BinariesDirectory)/${{ parameters.build_configuration }}'
        artifactName: 'build_output_${{ parameters.BUILD_SUFFIX }}'
        parallel: true
      condition: succeeded()

  - template : build_teardown_steps.yml
    parameters:
      repo_root_override: ${{ parameters.repo_root_override }}
      ARCH_TYPE: ${{ parameters.ARCH_TYPE }}
      build_configuration: ${{ parameters.build_configuration }}
      artifact_name_suffix: ${{ parameters.BUILD_SUFFIX }}
