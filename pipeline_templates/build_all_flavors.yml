parameters:
  # GBALLOC_LL_TYPE_VALUES contains values from GBALLOC_LL_TYPE_VALUES of c-pal's CMakeLists.txt.
  # not all values listed in the CMakeLists need to be listed here - only those for which a completely separate build is done
  # GBALLOC_LL_TYPE_VALUES is an array of strings
  - name: GBALLOC_LL_TYPE_VALUES
    type: object
    default: ["PASSTHROUGH"]

  # FSANITIZE_TYPE_VALUES are the same as cmakelists "fsanitize" option used to pass (or not) /fsanitize=address to the compiler.
  - name: FSANITIZE_TYPE_VALUES
    type: object
    default: ["ON", "OFF"]

  # ARCH_TYPE_VALUES - architectures to build. Both x64 and ARM64 are blocking
  # by default; tests run on both unless the caller passes MAX_STAGE=BUILD.
  - name: ARCH_TYPE_VALUES
    type: object
    default: ["x64", "ARM64"]

  # BUILD_CONFIGURATION_TYPE_VALUES is a list of build configurations to be used in the pipeline
  - name: BUILD_CONFIGURATION_TYPE_VALUES
    type: object
    default: ["Debug", "RelWithDebInfo"]

  # cmake_options is a string that is passed to the cmake command line.
  - name: cmake_options
    type: string
    default: "-Drun_reals_check:bool=ON -Drun_unittests:bool=ON -Drun_int_tests:bool=ON -Duse_cppunittest:bool=ON -Drun_traceability:BOOL=OFF -Drun_repo_validation:BOOL=OFF"

  # additional_cmake_options is appended to cmake_options. Use this to add extra
  # options without replacing the defaults (e.g. -Drun_perf_tests:BOOL=ON).
  - name: additional_cmake_options
    type: string
    default: ""

  # If this parameter is specified the specified test suite will be run without invoking ctest
  - name: run_test_suite_without_ctest
    type: string
    default: ""

  # Settings to add an app verifier step for ctest
  # APP_VERIFIER_VALUES is a list of app verifier modes to iterate over.
  # When ["OFF"] (default), no AppVerifier jobs are generated.
  # When ["OFF", "ON"], both normal and AppVerifier jobs are generated in parallel.
  - name: APP_VERIFIER_VALUES
    type: object
    default: ["OFF"]
  # This may be overridden to pass a different value to run_ctest_with_appverifier.yml, depending on how c-build-tools is consumed
  - name: repo_root_override
    default: $(Build.SourcesDirectory)/deps/c-build-tools
  # Used for app verifier script to find the binaries, typically this will be _exe_suffix.exe where suffix is defined by the project
  - name: binary_name_suffix
    default: "_exe.exe"
  # Must be separated by '|' or empty to run all tests.
  # Callers can have a yml object/list and use ${{ join('|', my_list) }} to pass as string
  - name: appverifier_skip_tests_list
    type: string
    default: ""
  # Set to false for repos that don't have *_ut_*.dll test assemblies (e.g. macro-utils-c)
  - name: failOnMinTestsNotRun
    type: boolean
    default: true
  - name: pool_name_x64
    type: string
    default: "Azure-MessagingStore-WinBuildPoolVS2022_1"
  - name: pool_name_arm64
    type: string
    default: "Azure-MessagingStore-Win-ARM64-Dpldsv6-v01"

  # MAX_STAGE controls how far the pipeline runs. Matches the convention used
  # by downstream repos so callers can use one knob.
  #   BUILD       - only compile binaries. Skip unit / int test execution.
  #   UNIT_TESTS  - compile + run unit tests only. CTest excludes tests whose
  #                 names match _int(_*)? / _perf(_*)? / _e2e(_*)?, regardless
  #                 of architecture. VSTest already restricts to *_ut_*.dll.
  #   ALL         - compile + run all registered CTest tests (no category
  #                 filter). Actual categories depend on cmake_options such as
  #                 run_int_tests / run_perf_tests / run_e2e_tests.
  # MAX_STAGE applies as the default to every architecture. To run a different
  # stage on a specific architecture, set the corresponding MAX_STAGE_<arch>
  # override below (an empty string means "fall back to MAX_STAGE").
  - name: MAX_STAGE
    type: string
    default: "UNIT_TESTS"
    values:
      - "BUILD"
      - "UNIT_TESTS"
      - "ALL"

  # Per-architecture overrides for MAX_STAGE. Empty (the default) means use the
  # symmetric MAX_STAGE param. Useful for asymmetric matrices like "x64 runs
  # ALL tests, ARM64 runs only UNIT_TESTS" without forcing one knob to fit
  # both architectures.
  - name: MAX_STAGE_x64
    type: string
    default: ""
    values:
      - ""
      - "BUILD"
      - "UNIT_TESTS"
      - "ALL"
  - name: MAX_STAGE_arm64
    type: string
    default: ""
    values:
      - ""
      - "BUILD"
      - "UNIT_TESTS"
      - "ALL"
  - name: MAX_STAGE_x86
    type: string
    default: ""
    values:
      - ""
      - "BUILD"
      - "UNIT_TESTS"
      - "ALL"

  - name: skip_repo_validation
    type: boolean
    default: false

  # When true, run NuGetAuthenticate and NuGetToolInstaller before cmake
  # so that execute_process(COMMAND nuget ...) can access private feeds.
  - name: setup_nuget
    type: boolean
    default: false

jobs:
# Run repo validation and traceability once (not per-flavor)
- ${{ if not(parameters.skip_repo_validation) }}:
  - template: run_repo_validation.yml
    parameters:
      additional_cmake_options: ${{ parameters.additional_cmake_options }}
      pool_name: ${{ parameters.pool_name_x64 }}
      setup_nuget: ${{ parameters.setup_nuget }}

- ${{ each GBALLOC_LL_TYPE in parameters.GBALLOC_LL_TYPE_VALUES }}:
  - ${{ each FSANITIZE_TYPE in parameters.FSANITIZE_TYPE_VALUES }}:
    - ${{ each BUILD_CONFIGURATION_TYPE in parameters.BUILD_CONFIGURATION_TYPE_VALUES }}:
      - ${{ each ARCH_TYPE in parameters.ARCH_TYPE_VALUES }}:
        - ${{ each APP_VERIFIER in parameters.APP_VERIFIER_VALUES }}:
          # Exclusions:
          # - jemalloc + fsanitize: no point in running both
          # - jemalloc + ARM64: jemalloc doesn't support ARM64 on Windows
          # - appverifier + fsanitize: appverifier is incompatible with address sanitizer
          # - appverifier + run_test_suite_without_ctest: appverifier only works with ctest
          # - appverifier + MAX_STAGE=BUILD (per-arch effective stage): appverifier is a
          #   test-execution mode; no point building an APPVERIFIER=ON flavor when tests
          #   won't run for the architecture in question.
          - ${{ if and( or( ne( GBALLOC_LL_TYPE , 'JEMALLOC' ), ne(FSANITIZE_TYPE, 'ON')), or( ne( GBALLOC_LL_TYPE , 'JEMALLOC' ), ne(ARCH_TYPE, 'ARM64')), or( ne(APP_VERIFIER, 'ON'), ne(FSANITIZE_TYPE, 'ON')), or( ne(APP_VERIFIER, 'ON'), eq(parameters.run_test_suite_without_ctest, '')), or( ne(APP_VERIFIER, 'ON'), and(eq(ARCH_TYPE, 'x64'), ne(coalesce(parameters.MAX_STAGE_x64, parameters.MAX_STAGE), 'BUILD')), and(eq(ARCH_TYPE, 'ARM64'), ne(coalesce(parameters.MAX_STAGE_arm64, parameters.MAX_STAGE), 'BUILD')), and(eq(ARCH_TYPE, 'x86'), ne(coalesce(parameters.MAX_STAGE_x86, parameters.MAX_STAGE), 'BUILD')))) }}:
            - template: build_and_run_tests.yml
              parameters:
                BUILD_SUFFIX: _${{ BUILD_CONFIGURATION_TYPE }}_${{ GBALLOC_LL_TYPE }}_FSANITIZE_${{ FSANITIZE_TYPE }}_${{ ARCH_TYPE }}_APPVERIFIER_${{ APP_VERIFIER }}
                GBALLOC_LL_TYPE: ${{ GBALLOC_LL_TYPE }}
                build_configuration: ${{ BUILD_CONFIGURATION_TYPE }}
                FSANITIZE_TYPE: ${{ FSANITIZE_TYPE }}
                ARCH_TYPE: ${{ ARCH_TYPE }}
                APP_VERIFIER: ${{ APP_VERIFIER }}
                cmake_options: ${{ parameters.cmake_options }} ${{ parameters.additional_cmake_options }}
                run_test_suite_without_ctest: ${{ parameters.run_test_suite_without_ctest }}
                repo_root_override: ${{ parameters.repo_root_override }}
                binary_name_suffix: ${{ parameters.binary_name_suffix }}
                appverifier_skip_tests_list: ${{ parameters.appverifier_skip_tests_list }}
                failOnMinTestsNotRun: ${{ parameters.failOnMinTestsNotRun }}
                setup_nuget: ${{ parameters.setup_nuget }}
                # Per-architecture pool selection AND effective MAX_STAGE. Combined
                # into a single conditional block so each ARCH_TYPE iteration emits
                # exactly one pool_name + MAX_STAGE pair (avoids YAML duplicate-key
                # complaints from strict parsers; ADO would accept either form).
                # MAX_STAGE per arch: a non-empty MAX_STAGE_<arch> override wins
                # over the symmetric MAX_STAGE param via coalesce().
                ${{ if eq(ARCH_TYPE, 'ARM64') }}:
                  pool_name: ${{ parameters.pool_name_arm64 }}
                  MAX_STAGE: ${{ coalesce(parameters.MAX_STAGE_arm64, parameters.MAX_STAGE) }}
                ${{ elseif eq(ARCH_TYPE, 'x86') }}:
                  pool_name: ${{ parameters.pool_name_x64 }}
                  MAX_STAGE: ${{ coalesce(parameters.MAX_STAGE_x86, parameters.MAX_STAGE) }}
                ${{ else }}:
                  pool_name: ${{ parameters.pool_name_x64 }}
                  MAX_STAGE: ${{ coalesce(parameters.MAX_STAGE_x64, parameters.MAX_STAGE) }}
